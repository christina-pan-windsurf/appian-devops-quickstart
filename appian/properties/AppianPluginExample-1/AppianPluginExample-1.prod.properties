# AppianPluginExample-1 Production Environment Properties
# Environment-specific configuration for production deployment

# Environment Information
environment.name=production
environment.type=production

# Production Environment URLs
appian.base.url=https://production-environment.appiancloud.com/suite
appian.api.url=https://production-environment.appiancloud.com/suite/webapi

# Production Database Configuration
database.connection.production=true
database.validation.enabled=true

# Production-specific Plugin Settings
plugin.debug.enabled=false
plugin.logging.level=WARN

# MadLib Production Configuration
madlib.test.data.enabled=false
madlib.sample.templates=1

# Performance Settings for Production
performance.monitoring.enabled=true
performance.detailed.logging=false

# Security Settings
security.enhanced.enabled=true
security.audit.logging=true

# Production Deployment Settings
deployment.backup.enabled=true
deployment.rollback.enabled=true
