# AppianPluginExample-1 Test Environment Properties
# Environment-specific configuration for test deployment

# Environment Information
environment.name=test
environment.type=development

# Test Environment URLs
appian.base.url=https://test-environment.appiancloud.com/suite
appian.api.url=https://test-environment.appiancloud.com/suite/webapi

# Test Database Configuration
database.connection.test=true
database.validation.enabled=true

# Test-specific Plugin Settings
plugin.debug.enabled=true
plugin.logging.level=DEBUG

# MadLib Test Configuration
madlib.test.data.enabled=true
madlib.sample.templates=5

# Performance Settings for Test
performance.monitoring.enabled=true
performance.detailed.logging=true
