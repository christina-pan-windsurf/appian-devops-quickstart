# AppianPluginExample-1 Staging Environment Properties
# Environment-specific configuration for staging deployment

# Environment Information
environment.name=staging
environment.type=staging

# Staging Environment URLs
appian.base.url=https://staging-environment.appiancloud.com/suite
appian.api.url=https://staging-environment.appiancloud.com/suite/webapi

# Staging Database Configuration
database.connection.staging=true
database.validation.enabled=true

# Staging-specific Plugin Settings
plugin.debug.enabled=false
plugin.logging.level=INFO

# MadLib Staging Configuration
madlib.test.data.enabled=false
madlib.sample.templates=3

# Performance Settings for Staging
performance.monitoring.enabled=true
performance.detailed.logging=false

# Integration Test Settings
integration.tests.enabled=true
acceptance.tests.enabled=true
